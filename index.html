<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול עסק סופר סתם - יוסי</title>
    <!-- טעינת ספריות לעבודה ישירה בדפדפן -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Assistant', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* רקע תוסס וחי - שילוב גווני שקיעה אנרגטיים */
        .app-bg {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* עיצוב הכרטיסים הלבנים */
        .main-card {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        /* כרטיס סיכום במראה זכוכית בהירה - מתאים הרבה יותר לרקע חי */
        .summary-glass {
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        /* ביטול גלילה אופקית */
        #root { width: 100%; overflow-x: hidden; }
    </style>
</head>
<body class="app-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // אייקונים
        const IconScroll = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2"/><path d="M15 21v-2"/></svg>
        );
        const IconPlus = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const IconMinus = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const IconWallet = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
        );
        const IconTag = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        );
        const IconTrash = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        );

        function App() {
            const getInitialState = (key, defaultValue) => {
                const saved = localStorage.getItem(key);
                return saved !== null ? JSON.parse(saved) : defaultValue;
            };

            const [mezuzotCount, setMezuzotCount] = useState(() => getInitialState('mezuzotCount', 0));
            const [pricePerMezuzah, setPricePerMezuzah] = useState(() => getInitialState('pricePerMezuzah', 300));
            const [debtType, setDebtType] = useState(() => getInitialState('debtType', 'merchant_owes'));
            const [debtAmount, setDebtAmount] = useState(() => getInitialState('debtAmount', 0));
            const [greeting, setGreeting] = useState('');
            const [showConfirm, setShowConfirm] = useState(false);

            useEffect(() => {
                localStorage.setItem('mezuzotCount', JSON.stringify(mezuzotCount));
                localStorage.setItem('pricePerMezuzah', JSON.stringify(pricePerMezuzah));
                localStorage.setItem('debtType', JSON.stringify(debtType));
                localStorage.setItem('debtAmount', JSON.stringify(debtAmount));
            }, [mezuzotCount, pricePerMezuzah, debtType, debtAmount]);

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour >= 5 && hour < 12) setGreeting('בוקר טוב');
                else if (hour >= 12 && hour < 18) setGreeting('צהריים טובים');
                else if (hour >= 18 && hour < 22) setGreeting('ערב טוב');
                else setGreeting('לילה טוב');
            }, []);

            const mezuzotTotal = (Number(mezuzotCount) || 0) * (Number(pricePerMezuzah) || 0);
            const currentDebt = Number(debtAmount) || 0;
            const finalPayment = debtType === 'merchant_owes' 
                ? mezuzotTotal + currentDebt 
                : mezuzotTotal - currentDebt;

            const resetAll = () => {
                setMezuzotCount(0);
                setDebtAmount(0);
                setShowConfirm(false);
            };

            return (
                <div className="pb-10 flex flex-col items-center min-h-screen w-full">
                    {/* Header */}
                    <div className="w-full bg-white/95 backdrop-blur-md border-b border-orange-200 px-6 py-4 sticky top-0 z-20 shadow-sm text-center">
                        <div className="flex items-center justify-center gap-2">
                            <div className="text-orange-600"><IconScroll /></div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">{greeting} יוסי</h1>
                        </div>
                    </div>

                    <div className="w-full max-w-md p-4 space-y-4 mt-2 text-right">
                        
                        {/* תשלום עתידי צפוי - עיצוב זכוכית שקוף ומשודרג */}
                        <div className="summary-glass rounded-[2rem] p-7 text-slate-900 shadow-2xl relative overflow-hidden">
                            <div className="relative z-10 text-center">
                                <p className="text-slate-600 text-xs mb-1 font-bold uppercase tracking-widest opacity-80">תשלום עתידי צפוי</p>
                                <div className="flex items-baseline justify-center gap-2">
                                    <span className="text-6xl font-black tracking-tighter text-slate-900">
                                        {finalPayment.toLocaleString()}
                                    </span>
                                    <span className="text-2xl text-orange-600 font-bold">₪</span>
                                </div>
                                <div className="mt-6 grid grid-cols-2 gap-2 border-t border-slate-900/10 pt-4 text-[11px]">
                                    <div className="bg-black/5 p-2 rounded-lg text-center">
                                        <span className="block text-slate-500 mb-1 font-medium">עבור {mezuzotCount} יח'</span>
                                        <span className="font-bold text-sm text-slate-800">{mezuzotTotal.toLocaleString()} ₪</span>
                                    </div>
                                    <div className="bg-black/5 p-2 rounded-lg text-center border-r border-slate-900/5">
                                        <span className="block text-slate-500 mb-1 font-medium">חובות / יתרה</span>
                                        <span className={`font-bold text-sm ${debtType === 'merchant_owes' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                            {debtType === 'merchant_owes' ? '+' : '-'} {currentDebt.toLocaleString()} ₪
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* כמות מזוזות */}
                        <div className="main-card rounded-3xl border border-white/50 p-5">
                            <h2 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                                <span className="w-1.5 h-5 bg-blue-500 rounded-full shadow-lg shadow-blue-100"></span> 
                                כמות מזוזות מוכנות
                            </h2>
                            <div className="flex items-center justify-between bg-slate-50 rounded-2xl p-3 border border-slate-100 shadow-inner">
                                <button onClick={() => setMezuzotCount(p => Math.max(0, Number(p) - 1))} className="w-12 h-12 bg-white shadow-sm border border-slate-200 rounded-xl flex items-center justify-center active:scale-90 transition-all text-slate-400"><IconMinus /></button>
                                <div className="text-center flex-1">
                                    <input type="number" inputMode="numeric" value={mezuzotCount} onChange={(e) => setMezuzotCount(e.target.value)} className="w-full text-center text-4xl font-black text-slate-800 bg-transparent border-none focus:ring-0 p-0" />
                                    <p className="text-[10px] text-slate-400 font-bold">הקש לעריכה</p>
                                </div>
                                <button onClick={() => setMezuzotCount(p => Number(p) + 1)} className="w-12 h-12 bg-blue-500 shadow-md rounded-xl flex items-center justify-center text-white active:scale-90 transition-all"><IconPlus /></button>
                            </div>
                        </div>

                        {/* מחיר ליחידה */}
                        <div className="main-card rounded-3xl border border-white/50 p-5 text-right">
                            <h2 className="font-bold text-slate-700 mb-4 flex items-center gap-2 text-right">
                                <span className="w-1.5 h-5 bg-amber-500 rounded-full shadow-lg shadow-amber-100"></span> 
                                מחיר למזוזה (₪)
                            </h2>
                            <div className="relative group text-right">
                                <div className="absolute inset-y-0 right-3 flex items-center text-slate-300 group-focus-within:text-amber-500 transition-colors"><IconTag /></div>
                                <input type="number" inputMode="numeric" value={pricePerMezuzah} onChange={(e) => setPricePerMezuzah(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 pr-10 pl-4 text-left font-black text-xl text-slate-800 focus:ring-2 focus:ring-amber-500/20 focus:outline-none transition-all" />
                            </div>
                        </div>

                        {/* התחשבנות חובות */}
                        <div className="main-card rounded-3xl border border-white/50 p-5 text-right">
                            <h2 className="font-bold text-slate-700 mb-4 flex items-center gap-2 text-right">
                                <span className="w-1.5 h-5 bg-purple-500 rounded-full shadow-lg shadow-purple-100"></span> 
                                התחשבנות חוב/מקדמה
                            </h2>
                            <div className="space-y-4">
                                <div className="flex p-1 bg-slate-100/50 rounded-xl">
                                    <button onClick={() => setDebtType('merchant_owes')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition-all ${debtType === 'merchant_owes' ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'}`}>הסוחר חייב לי</button>
                                    <button onClick={() => setDebtType('sofer_owes')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition-all ${debtType === 'sofer_owes' ? 'bg-white shadow-md text-rose-600' : 'text-slate-500'}`}>אני חייב לסוחר</button>
                                </div>
                                <div className="relative group text-right">
                                    <div className="absolute inset-y-0 right-3 flex items-center text-slate-300 group-focus-within:text-purple-500 transition-colors"><IconWallet /></div>
                                    <input type="number" inputMode="decimal" value={debtAmount || ''} onChange={(e) => setDebtAmount(e.target.value)} placeholder="0" className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 pr-10 pl-4 text-left font-black text-xl text-slate-800 focus:ring-2 focus:ring-purple-500/20 focus:outline-none transition-all" />
                                </div>
                            </div>
                        </div>

                        {/* כפתור איפוס */}
                        <div className="flex flex-col items-center pt-6 pb-4">
                            {!showConfirm ? (
                                <button onClick={() => setShowConfirm(true)} className="flex items-center gap-2 text-white font-bold text-sm bg-black/20 hover:bg-black/30 px-8 py-3.5 rounded-full backdrop-blur-sm active:scale-95 transition-all shadow-lg border border-white/10">
                                    <IconTrash />
                                    איפוס נתונים
                                </button>
                            ) : (
                                <div className="flex items-center gap-3 bg-white p-3 rounded-2xl shadow-2xl animate-bounce border border-rose-100">
                                    <span className="text-xs font-bold text-slate-600 px-2">לאפס הכל?</span>
                                    <button onClick={resetAll} className="bg-rose-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-md shadow-rose-200">כן</button>
                                    <button onClick={() => setShowConfirm(false)} className="bg-slate-100 text-slate-500 px-5 py-2.5 rounded-xl text-xs font-bold">ביטול</button>
                                </div>
                            )}
                            <p className="mt-8 text-[11px] text-white font-black uppercase tracking-[0.2em] opacity-90 drop-shadow-sm">Scribe Manager יוסי</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
